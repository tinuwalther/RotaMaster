<!DOCTYPE html>
<html lang="en">

    <!-- Begin Head -->
    <head>
        <meta charset="UTF-8"  /><meta name="author" content="Martin Walther - @tinuwalther"/>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="keywords" content="Pode, FullCalendar, PowerShell, JavaScript"/>
        <meta name="description" content="RotaMaster is a Calendar App based on Pode and PowerShell-APIs"/>
        
        <link rel="stylesheet" href="/assets/BootStrap/bootstrap.min.css"/>
        <link rel="stylesheet" href="/assets/rotamaster/rotamaster.main.css"/>
        <link rel="stylesheet" href="/assets/bootstrap/bootstrap-icons/font/bootstrap-icons.min.css"/>
    
        <title id="title" >RotaMaster: Calculate</title><link type="image/x-icon" href="/assets/img/favicon.png" rel="icon"  />

    </head>
    <!-- End Head -->

    <!-- Begin Body -->
    <body>
        <Section Id="section"  >

            <!-- Begin NavBar -->
            <nav Class="navbar navbar-expand-sm bg-dark navbar-dark sticky-top"  >
                <div Class="container-fluid"  >
                    <img src="/assets/img/favicon.png" alt="Bootstrap" width="48" height="48">
                    <a Class="navbar-brand" id="navbarBrand" href="/" Target="_self"  >RotaMaster</a>
                    <button Class="navbar-toggler" type="button" title="Navbar" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar"  >
                        <span Class="navbar-toggler-icon"  ></span>
                    </button>
                    <div Id="collapsibleNavbar" Class="collapse navbar-collapse"  >
                        <ul Class="navbar-nav"  >
                            <li Class="nav-item"  ><a Class="nav-link" href="/absence" >Absenzen</a></li>
                            <li Class="nav-item"  ><a Class="nav-link" href="/person"  >Personen</a></li>
                            <li Class="nav-item"  ><a Class="nav-link" href="/calculate"  >Calculate</a></li>
                            <li Class="nav-item"  ><a Class="nav-link" href="/about"  >About</a></li>
                            <li Class="nav-item"  ><a Class="nav-link" href="/logout"  >Logoff</a></li>
                        </ul>
                        <span class="navbar-text ms-auto p-2" id="currentUser">
                            <!-- logged-in as Username -->
                        </span>
                        <span class="navbar-text p-2" id="language">
                            <!-- current browser language -->
                        </span>
                    </div>
                </div>
            </nav>
            <!-- End NavBar -->

            <!-- Begin Modal Alert -->
            <div class="modal fade" id="alert" tabindex="-1" aria-labelledby="alertLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="alertTitle">RotaMaster - Alert</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <p id="alertText"></p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" id="btnOk" class="btn btn-dark" data-bs-dismiss="modal">OK</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- End Modal Alert -->
            
            <!-- Begin Modal Confirm -->
            <div class="modal fade" id="confirm" tabindex="-1" aria-labelledby="confirmLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="confirmTitle">RotaMaster - Confirm</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <p id="confirmText"></p>
                        </div>
                        <div class="modal-footer">
                            <!-- return false -->
                            <button type="button" id="btnNo" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                            <!-- return true -->
                            <button type="button" id="btnYes" class="btn btn-dark">Yes</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- End Modal Confirm -->
            
            <div class="container mt-4">
                <h2>Working Time Calculator</h2>

                <div class="row">
                    <!-- Morning Card -->
                    <div class="col-lg-6 mb-3">
                        <div class="card h-100">
                            <div class="card-header">
                                <strong>Morning</strong>
                            </div>

                            <div class="card-body">
                                
                                <div class="row mb-3">
                                    <!-- Start Time -->
                                    <div class="col-md-6">
                                        <label for="startTimeAM" class="form-label">Start Time</label>
                                        <input type="time" class="form-control" id="startTimeAM" placeholder="08:00">
                                    </div>
                                
                                    <!-- End Time -->
                                    <div class="col-md-6">
                                        <label for="endTimeAM" class="form-label">End Time</label>
                                        <input type="time" class="form-control" id="endTimeAM" placeholder="12:12">
                                    </div>
                                </div>
                                
                                <!-- Break (optional) -->
                                <div class="mb-3">
                                    <label for="breakTimeAM" class="form-label">Break (Minutes)</label>
                                    <input type="number" class="form-control" id="breakTimeAM" value="0" min="0">
                                </div>
                                
                                <!-- Result -->
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="totalTimeAM" class="form-label">Working Time</label>
                                        <input type="text" class="form-control" id="totalTimeAM" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="decimalTimeAM" class="form-label">Decimal Hours</label>
                                        <input type="text" class="form-control" id="decimalTimeAM" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                </div>

                                <!-- On-call Time in separate row -->
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="onCallTimeAM" class="form-label" 
                                            data-bs-toggle="tooltip" 
                                            data-bs-placement="top" 
                                            data-bs-title="Time from midnight (00:00) to start of work"
                                            style="cursor: help;">
                                            On-call Time (Monday) <i class="bi bi-info-circle"></i>
                                        </label>
                                        <input type="text" class="form-control" id="onCallTimeAM" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="decimalOnCallTimeAM" class="form-label">Decimal Hours</label>
                                        <input type="text" class="form-control" id="decimalOnCallTimeAM" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- Afternoon Card -->
                    <div class="col-lg-6 mb-3">
                        <div class="card h-100">
                            <div class="card-header">
                                <strong>Afternoon</strong>
                            </div>

                            <div class="card-body">
                                
                                <div class="row mb-3">
                                    <!-- Start Time -->
                                    <div class="col-md-6">
                                        <label for="startTimePM" class="form-label">Start Time</label>
                                        <input type="time" class="form-control" id="startTimePM" placeholder="13:00">
                                    </div>
                                
                                    <!-- End Time -->
                                    <div class="col-md-6">
                                        <label for="endTimePM" class="form-label">End Time</label>
                                        <input type="time" class="form-control" id="endTimePM" placeholder="17:12">
                                    </div>
                                </div>
                                
                                <!-- Break (optional) -->
                                <div class="mb-3">
                                    <label for="breakTimePM" class="form-label">Break (Minutes)</label>
                                    <input type="number" class="form-control" id="breakTimePM" value="0" min="0">
                                </div>
                                
                                <!-- Result -->
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="totalTimePM" class="form-label">Working Time</label>
                                        <input type="text" class="form-control" id="totalTimePM" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="decimalTimePM" class="form-label">Decimal Hours</label>
                                        <input type="text" class="form-control" id="decimalTimePM" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                </div>

                                <!-- On-call Time in separate row -->
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="onCallTimePM" class="form-label" 
                                            data-bs-toggle="tooltip" 
                                            data-bs-placement="top" 
                                            data-bs-title="Time from end of work to midnight (24:00)"
                                            style="cursor: help;">
                                            On-call Time (Monday) <i class="bi bi-info-circle"></i>
                                        </label>
                                        <input type="text" class="form-control" id="onCallTimePM" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="decimalOnCallTimePM" class="form-label">Decimal Hours</label>
                                        <input type="text" class="form-control" id="decimalOnCallTimePM" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>

                <!-- Total Calculation -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <strong>Total Working Time (Morning + Afternoon)</strong>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <label for="totalTimeTotal" class="form-label">Total Working Time</label>
                                        <input type="text" class="form-control form-control-lg" id="totalTimeTotal" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="decimalTimeTotal" class="form-label">Total Decimal Hours</label>
                                        <input type="text" class="form-control form-control-lg" id="decimalTimeTotal" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- On-call Calculation -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <strong>On-call time (24 h)</strong>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <label for="totalOnCallTime" class="form-label"
                                            data-bs-toggle="tooltip" 
                                            data-bs-placement="top" 
                                            data-bs-title="Total on-call time is calculated as total 24-hour period minus total working time."
                                            style="cursor: help;">
                                            Total On-call Time <i class="bi bi-info-circle"></i>
                                        </label>
                                        <input type="text" class="form-control form-control-lg" id="totalOnCallTime" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="decimalOnCallTime" class="form-label">Total Decimal Hours</label>
                                        <input type="text" class="form-control form-control-lg" id="decimalOnCallTime" readonly 
                                            style="background-color: #e9ecef; font-weight: bold;">
                                    </div>
                                </div>
                            </div>
                       </div>
                    </div>
                </div>

            </div>

        </Section>

        <script src="/assets/BootStrap/bootstrap.bundle.min.js"></script>
        <script src="/assets/fullcalendar/index.global.min.js"></script>
        <script src="/assets/rotamaster/rotamaster.config.js"></script>
        <script src="/assets/rotamaster/rotamaster.main.js"></script>
        <script src="/assets/rotamaster/rotamaster.calculate.js"></script>

    </body>
    <!-- End Body -->
    
</html>
